<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Records</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">
</head>
<body>
<div class="container mt-5">
<div class="d-flex justify-content-between align-items-center mb-3">
<h2>Student Records</h2>
<a href="{% url 'student_create' %}" class="btn btn-primary">
Add Student</a>
</div>
<table class="table table-bordered table-striped">
<thead class="table-dark">
<tr><th>ID</th><th>Name</th><th>Email</th><th>Course</th><th>Actions</th></tr>
</thead>
<tbody>
{% for student in students %}
<tr>
<td>{{ student.id }}</td>
<td>{{ student.name }}</td>
<td>{{ student.email }}</td>
<td>{{ student.course }}</td>
<td>
<a href="{% url 'student_update' student.id %}" class="btn btn-warning btn-sm">Edit</a>
<a href="{% url 'student_delete' student.id %}" class="btn btn-danger btn-sm">Delete</a>
</td>
</tr>
{% empty %}
<tr><td colspan="5" class="text-center">No records found.</td></tr>
{% endfor %}
</tbody>
</table>
</div>
</body>
</html>
