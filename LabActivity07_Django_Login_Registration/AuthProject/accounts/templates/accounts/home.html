<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
</head>
<body>
  <h2>Homepage</h2>

  {% if user.is_authenticated %}
    <p>Welcome, <strong>{{ user.username }}</strong>!</p>
    <p><a href="/logout/">Logout</a></p>
  {% else %}
    <p>You are not logged in.</p>
    <p><a href="/login/">Login</a> | <a href="/register/">Register</a></p>
  {% endif %}
</body>
</html>
