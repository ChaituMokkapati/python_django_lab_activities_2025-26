<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>
</head>
<body>
<h2>Login</h2>

{% if messages %}
{% for message in messages %}
<p>{{ message }}</p>
{% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}
{{ login_form.as_p }}
<button type="submit">Login</button>
</form>

<br>
<a href="{% url 'home' %}">Back to Home</a>
</body>
</html>
