<!DOCTYPE html>
<html>
<head>
<title>User Registration</title>
</head>
<body>
<h2>User Registration Page</h2>

{% if messages %}
{% for message in messages %}
<p>{{ message }}</p>
{% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}
{{ register_form.as_p }}
<button type="submit">Register</button>
</form>
</body>
</html>
