<!DOCTYPE html>
<html>
<head>
<title>Student Records</title>
</head>
<body>
<h2>Add Student</h2>
<form method="POST">
{% csrf_token %}
{{ form.as_p }}
<button type="submit">Save</button>
</form>

<h2>Saved Students</h2>
{% if students %}
<ul>
{% for student in students %}
<li>{{ student.name }} - {{ student.email }} - {{ student.course }}</li>
{% endfor %}
</ul>
{% else %}
<p>No records available.</p>
{% endif %}
</body>
</html>
